x}.entry-actions{display:flex;gap:4px}.btn-small{padding:3px 8px;font-size:11px;border:1px solid var(--border);background:white;color:var(--text-light)}.btn-small:hover{background:var(--blue-light);color:var(--blue-dark);border-color:var(--blue-light)}.entry-content{font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-wrap:break-word}.entry-tags{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}.tag{background:var(--blue-light);color:var(--blue-dark);padding:2px 8px;border-radius:10px;font-size:10px}.empty{text-align:center;padding:40px 20px;color:var(--text-light);font-size:13px}.modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(2px)}.modal.show{display:flex}.modal-box{background:var(--cream);border-radius:10px;border:1.5px solid var(--border);width:100%;max-width:440px;box-shadow:4px 4px 0 var(--blue-light)}.modal-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;color:var(--blue-dark)}.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);line-height:1}.modal-body{padding:14px}.form-group{margin-bottom:12px}.form-label{font-size:11px;color:var(--text-light);margin-bottom:4px;display:block}.form-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:white;color:var(--text)}.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light)}textarea.form-input{min-height:120px;resize:none;line-height:1.6}.mood-selector{display:flex;gap:6px}.mood-btn{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:6px;background:white;font-size:18px;cursor:pointer;transition:all 0.2s}.mood-btn:hover{transform:scale(1.05);border-color:var(--blue)}.mood-btn.active{border-color:var(--blue-dark);b
